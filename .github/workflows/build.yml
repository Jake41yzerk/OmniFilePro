name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.0'
          cache: true

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install fyne-cross
        run: go install github.com/fyne-io/fyne-cross@latest

      - name: Build APK
        env:
          GOTOOLCHAIN: auto
        run: ~/go/bin/fyne-cross android -app-id com.mahajake.omnifilepro -icon Icon.png

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OmniFilePro-APK
          path: fyne-cross/dist/android/*.apk
          retention-days: 7
